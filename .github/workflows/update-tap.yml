name: Update Homebrew Formulas

on:
  repository_dispatch:
    types: [update-jar-cart]

permissions:
  contents: write

jobs:
  update-formulas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Homebrew Tap Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Extract Payload Data
        id: payload
        run: |
          PROJECT_NAME="${{ github.event.client_payload.project_name }}"
          if [ -z "$PROJECT_NAME" ]; then
            PROJECT_NAME="jar-cart"
          fi
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT

          TAG_REF="${{ github.event.client_payload.ref }}"
          echo "tag_ref=$TAG_REF" >> $GITHUB_OUTPUT

          VERSION="${TAG_REF#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "linux_sha256=${{ github.event.client_payload.linux_sha256 }}" >> $GITHUB_OUTPUT
          echo "macos_sha256=${{ github.event.client_payload.macos_sha256 }}" >> $GITHUB_OUTPUT

      - name: Validate Payload and Script Existence
        run: |
          chmod +x ./scripts/validate-release.sh
          ./scripts/validate-release.sh \
            "${{ steps.payload.outputs.project_name }}" \
            "${{ steps.payload.outputs.tag_ref }}" \
            "${{ steps.payload.outputs.linux_sha256 }}" \
            "${{ steps.payload.outputs.macos_sha256 }}"

      - name: Run Formula Generation Script
        run: |
          PROJECT_NAME="${{ steps.payload.outputs.project_name }}"
          SCRIPT_PATH="./scripts/update-${PROJECT_NAME}-formulas.sh"

          chmod +x "$SCRIPT_PATH"
          "$SCRIPT_PATH" \
            "${{ steps.payload.outputs.tag_ref }}" \
            "${{ steps.payload.outputs.linux_sha256 }}" \
            "${{ steps.payload.outputs.macos_sha256 }}"

      - name: Run Git Commit and Push Script
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          chmod +x ./scripts/git-commit-push.sh
          ./scripts/git-commit-push.sh \
            "${{ steps.payload.outputs.project_name }}" \
            "${{ steps.payload.outputs.tag_ref }}"
